params:
  seed: 42

  env:
    clip_observations: 5.0
    clip_actions: 1.0

  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd

  network:
    name: actor_critic
    # Preserve compatibility with historical task checkpoints.  Critic warm-up / anchored BC-PPO
    # runs explicitly override this to True after converting the checkpoint with
    # separate_actor_critic_checkpoint.py.
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: 'fixed'  # plain PPO for this run (SAPG's coef_cond is only for the mixed_expl run)
    mlp:
      units: [256, 128, 64]
      activation: elu
      d2rl: False
      initializer:
        name: default
      regularizer:
        name: None

  load_checkpoint: False
  load_path: ''

  config:
    name: pick_tool_token
    env_name: rlgpu
    device: 'cuda:0'
    device_name: 'cuda:0'
    multi_gpu: False
    ppo: True
    mixed_precision: False
    normalize_input: True
    normalize_value: True
    num_actors: -1
    # ===== SAPG structured exploration (mixed_expl) — 8192 actors split into 2 blocks of 4096: one
    # gets an entropy intrinsic-reward coef (explores hard), one exploits; sigma is coef-conditioned
    # (fixed_sigma: coef_cond) and the exploit block learns from the explore block (use_others_experience:
    # lf). Symmetric critic state provided by the env (state_space=86). expl_reward_type MUST be
    # 'entropy'|'none' ('rnd' -> NotImplementedError). =====
    expl_type: 'none'   # plain PPO for THIS run (the SAPG mixed_expl run mvp23c is already running with
                        # its own loaded config; these SAPG keys below are ignored when expl_type=none)
    expl_reward_type: entropy
    expl_reward_coef_embd_size: 32
    expl_reward_coef_scale: 0.002
    expl_coef_block_size: 4096
    use_others_experience: lf
    off_policy_ratio: 1.0
    # Optional frozen-reference actor regularizer implemented by the SAPG fork.  Leave disabled
    # for training from scratch; BC/PPO fine-tuning supplies the converted separate checkpoint and
    # overrides network.separate=True.  freeze_actor requires that separate network.
    behavior_anchor_coef: 0.0
    behavior_anchor_checkpoint: ''
    behavior_anchor_demo_coef: 0.0
    behavior_anchor_demo_batch_size: 0
    behavior_anchor_dataset: ''
    positive_advantage_only: False
    freeze_actor: False
    freeze_input_normalization: False
    reward_shaper:
      scale_value: 0.01
    normalize_advantage: True
    gamma: 0.99
    tau: 0.95
    learning_rate: 5e-4
    lr_schedule: adaptive    # clean baseline: KL-adaptive LR (original). No entropy schedule this round.
    schedule_type: standard
    kl_threshold: 0.008
    score_to_win: 100000
    max_epochs: 5000
    save_best_after: 100
    save_frequency: 200
    print_stats: True
    grad_norm: 1.0
    entropy_coef: 0.0    # cleanest baseline: PPO's Gaussian still SAMPLES actions (not deterministic),
                         # this just adds no pressure to widen sigma. 0.01 was shown to wreck fine contact.
    truncate_grads: True
    e_clip: 0.2
    horizon_length: 32
    minibatch_size: 16384
    mini_epochs: 8
    critic_coef: 4
    clip_value: True
    bounds_loss_coef: 0.0001
